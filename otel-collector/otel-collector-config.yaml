receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

exporters:
  clickhouse:
    endpoint: tcp://clickhouse:9000
    username: ${CLICKHOUSE_USER}
    password: ${CLICKHOUSE_PASSWORD}
    database: otel
    create_schema: true
    timeout: 5s
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      queue_size: 10000

  file/backup:
    path: /data/backup.jsonl
    format: json
    compression: zstd
    flush_interval: 1s
    rotation:
      max_megabytes: 50
      max_backups: 10

service:
  pipelines:
    traces:
      receivers: [otlp]
      exporters: [clickhouse, file/backup]
    metrics:
      receivers: [otlp]
      exporters: [clickhouse, file/backup]
    logs:
      receivers: [otlp]
      exporters: [clickhouse, file/backup]
