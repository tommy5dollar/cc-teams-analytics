services:
  clickhouse:
    ports:
      - "8123:8123"   # HTTP API (exposed for dev tools)
      - "9000:9000"   # Native protocol (exposed for dev tools)

  otel-collector:
    depends_on:
      clickhouse:
        condition: service_started  # don't wait for full health in dev

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    image: cc-teams-analytics/dashboard:dev
    environment:
      NODE_ENV: development
    volumes:
      - ./dashboard/src:/app/src:ro   # hot reload via bind mount
    ports:
      - "3000:3000"
